<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Payroll System</title>
    <link rel="stylesheet" href="exp5.css">
</head>
<body>

<div class="container">
    <h2>Employee Payroll System</h2>

    <input type="text" id="empName" placeholder="Employee Name">
    <input type="number" id="basicSalary" placeholder="Basic Salary">

    <button onclick="calculateSalary()">Calculate Salary</button>

    <div class="results">
        <p id="grossSalary"></p>
        <p id="taxAmount"></p>
        <p id="netSalary"></p>
    </div>
</div>

<script>
    /* -------- Constructor Function -------- */
    function Employee(name, basicSalary, hra = 2000, ta = 1000) {
        this.name = name;
        this.basicSalary = basicSalary;
        this.hra = hra;
        this.ta = ta;

        /* -------- Object Method -------- */
        this.calculateNetSalary = function () {
            const grossSalary = this.basicSalary + this.hra + this.ta;
            const tax = grossSalary * 0.10;
            const netSalary = grossSalary - tax;

            return {
                gross: grossSalary,
                tax: tax,
                net: netSalary
            };
        };
    }

    /* -------- DOM + Event Handling -------- */
    function calculateSalary() {
        const name = document.getElementById("empName").value.trim();
        const basic = parseFloat(document.getElementById("basicSalary").value);

        if (name === "" || isNaN(basic)) {
            alert("Please enter valid employee details");
            return;
        }

        const emp = new Employee(name, basic);
        const salary = emp.calculateNetSalary();

        document.getElementById("grossSalary").textContent =
            "Gross Salary: ₹" + salary.gross;

        document.getElementById("taxAmount").textContent =
            "Tax (10%): ₹" + salary.tax;

        document.getElementById("netSalary").textContent =
            "Net Salary: ₹" + salary.net;
    }
</script>

</body>
</html>
